name: Build APK

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          SDK_MGR="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDK_MGR" ]; then
            SDK_MGR="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          fi
          echo "SDK manager: $SDK_MGR"
          echo "ANDROID_HOME: $ANDROID_HOME"
          ls -la $(dirname "$SDK_MGR") 2>/dev/null || echo "cmdline-tools not found"
          yes | $SDK_MGR --install "platforms;android-34" "build-tools;34.0.0" || true

- name: Build release APK
  run: |
    cd android
    chmod +x gradlew
    # Use test keystore for CI build
    echo "test.keystore" > app/keystore.jks
    ./gradlew assembleRelease --no-daemon

      - uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/xq-*.apk
          generate_release_notes: true
