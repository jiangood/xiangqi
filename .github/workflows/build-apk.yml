name: Build APK

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          SDK_MGR="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDK_MGR" ]; then
            SDK_MGR="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          fi
          echo "SDK manager: $SDK_MGR"
          echo "ANDROID_HOME: $ANDROID_HOME"
          ls -la $(dirname "$SDK_MGR") 2>/dev/null || echo "cmdline-tools not found"
          yes | $SDK_MGR --install "platforms;android-34" "build-tools;34.0.0" || true

      - name: Setup keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/keystore.jks
          else
            keytool -genkey -v -keystore android/app/keystore.jks \
              -alias ci -keyalg RSA -keysize 2048 -validity 365 \
              -storepass android -keypass android \
              -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=CN"
          fi

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'ci' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/xq-*.apk
          generate_release_notes: true
